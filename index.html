<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI高效人才培訓計畫｜AI工作效率實戰班</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:#f7f8fb;color:#172033;line-height:1.8}
    a{text-decoration:none;color:inherit}
    .container{width:min(1120px,92%);margin:auto}
    .hero{background:linear-gradient(135deg,#07111f,#111827 55%,#c2410c);color:white;padding:72px 0 56px;overflow:hidden}
    .hero-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:40px;align-items:center}
    .tag{display:inline-block;background:#c2410c;padding:6px 14px;border-radius:999px;font-size:14px;font-weight:700;margin-bottom:18px}
    h1{font-size:42px;line-height:1.25;margin-bottom:18px}
    .subtitle{font-size:18px;color:#d8dee9;line-height:1.6;margin-bottom:28px}
    .hero-card{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;box-shadow:0 25px 80px rgba(0,0,0,.28)}
    .hero-card img{width:100%;border-radius:18px;display:block}
    .cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:25px}
    .btn{background:#c2410c;color:white;padding:14px 24px;border-radius:10px;font-weight:800;display:inline-block;text-align:center}
    .btn.secondary{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:28px}
    .stat{background:rgba(255,255,255,.08);padding:16px;border-radius:16px;text-align:center}
    .stat b{font-size:26px;color:#ffb27b;display:block}
    section{padding:72px 0}
    .title{text-align:center;margin-bottom:42px}
    .title h2{font-size:34px;color:#0f172a;margin-bottom:8px}
    .title p{color:#64748b;font-size:18px}
    .pain-grid,.skill-grid,.take-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
    .card{background:white;border:1px solid #e5e7eb;border-radius:22px;padding:26px;box-shadow:0 10px 28px rgba(15,23,42,.06)}
    .card .icon{font-size:36px;margin-bottom:12px}
    .card h3{font-size:22px;margin-bottom:10px;color:#111827}
    .card p{color:#5b6475;font-size:15px}
    .card ul{padding-left:20px;margin-top:10px;color:#475569;font-size:14px}
    .dark{background:#0f172a;color:white}
    .dark .title h2{color:white}
    .dark .title p{color:#cbd5e1}
    .skill{background:#121c2f;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:26px}
    .skill span{display:inline-block;color:#ffb27b;font-weight:900;margin-bottom:10px}
    .skill h3{font-size:22px;margin-bottom:12px}
    .skill ul{padding-left:20px;color:#dbe3ef;font-size:15px}
    .skill ul li{margin-bottom:6px}
    .visual{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:center}
    .visual img{width:100%;border-radius:24px;box-shadow:0 20px 50px rgba(15,23,42,.18)}
    .flow{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .step{background:white;border-radius:20px;padding:22px;text-align:center;border:1px solid #e5e7eb}
    .step b{display:block;font-size:28px;color:#c2410c}
    .instructor{background:white;border-radius:28px;padding:34px;display:grid;grid-template-columns:220px 1fr;gap:30px;align-items:center;box-shadow:0 14px 40px rgba(15,23,42,.08)}
    .avatar{height:220px;border-radius:24px;background:linear-gradient(135deg,#0f172a,#c2410c);display:flex;align-items:center;justify-content:center;color:white;font-size:72px}
    details{background:white;border:1px solid #e5e7eb;border-radius:16px;padding:18px 22px;margin-bottom:12px}
    summary{font-weight:800;cursor:pointer;color:#111827}
    details p{margin-top:10px;color:#475569}
    .final-cta
